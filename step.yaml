---
apiVersion: v3
kind: DefaultJob
id: 你的步骤ID
name: 自动化AI代码审核
description: 使用大模型来对codeup的merge request进行review，并自动提交评论
helpUrl: https://help.aliyun.com/zh/yunxiao/user-guide/use-flow-cli-to-customize-development-steps
execution:
  executor: node
  main: dist/index.js
items:
  - label: 模型名称
    name: modelName
    type: dropdown
    datasource:
    - label: deepseek-r1
      value: deepseek-r1
    - label: deepseek-v3
      value: deepseek-v3
    - label: qwen-max
      value: qwen-max
    - label: qwen-turbo-latest
      value: qwen-turbo-latest
    - label: qwen-turbo
      value: qwen-turbo
    - label: qwen-plus
      value: qwen-plus
    value: deepseek-v3
  - label: 云效token
    name: yunxiaoToken
    type: input
    description: 可以引用私密配置项 ${YUNXIAO_TOKEN},需要在流水线编辑页的变量与缓存中配置该变量的具体值
  - label: 模型BaseUrl
    name: aiBaseUrl
    type: input
    description: 配置模型厂商API地址，默认为 "https://dashscope.aliyuncs.com/compatible-mode/v1"
    value: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  - label: APIKey
    name: dashscopeApikey
    type: input
    description: 可以引用私密配置项 ${BAILIAN_APIKEY},需要在流水线编辑页的变量与缓存中配置该变量的具体值
  - label: 模型温度值
    name: temperature
    type: input
    description: 调用大模型时的温度值，默认为0.2
    value: "0.2"
  - label: 大模型提示词
    name: llmChatPrompt
    type: input
    description: "自定义系统提示词。若留空，将自动根据文件类型（Java/Go/Python/C++/Vue等）加载内置的架构师级评审Prompt，包含各语言的架构设计原则与开发规范。
       内置Prompt会自动覆盖：
          1. 逻辑错误/安全隐患/资源泄漏/并发问题
          2. 语言特定的架构设计规范（如DDD、Clean Architecture）
          3. 最佳实践与性能调优建议
          4. 结构化JSON输出以实现精准行号定位
       
       若您选择自定义，请确保您的Prompt能指导模型输出符合插件解析要求的格式（建议参考内置Prompt逻辑）。"
    value: ""

